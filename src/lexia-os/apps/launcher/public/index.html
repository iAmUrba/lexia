<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LexIA Launcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <div class="sidebar">
      <div class="logo">
        <h2>LexIA</h2>
      </div>
      
      <div class="menu">
        <button id="btn-inspect-case" class="menu-btn primary-btn">
          <span class="icon">🟢</span> Revisar expediente
        </button>
        <button id="btn-inspect-inbox" class="menu-btn primary-btn">
          <span class="icon">🟢</span> Revisar bandeja JUAN DAVID
        </button>
        <button id="btn-constancia" class="menu-btn secondary-btn" disabled>
          <span class="icon">⚪</span> Generar constancia (Pronto)
        </button>
        <button id="btn-glosador" class="menu-btn primary-btn">
          <span class="icon">🟠</span> Simular Glosado
        </button>
      </div>

      <div class="sidebar-footer">
        <p>LexIA Desktop v0.1</p>
      </div>
    </div>

    <div class="main-content">
      <div id="welcome-screen" class="screen active">
        <h1>Bienvenido a LexIA</h1>
        <p>Selecciona una opción en el menú lateral para comenzar.</p>
        <div class="activity-log" id="idle-log">
          Actividad: Esperando instrucciones...
        </div>
      </div>

      <div id="loading-screen" class="screen">
        <h2 id="loading-title">Analizando...</h2>
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
        <div class="terminal" id="terminal-log">
          <!-- Logs go here -->
        </div>
      </div>

      <div id="results-screen" class="screen">
        <div id="results-content"></div>
        
        <div class="action-buttons" style="margin-top: 30px; display: flex; gap: 10px;">
          <button class="back-btn" onclick="resetUI()">Volver al menú</button>
          <button class="back-btn primary-btn" id="btn-evidence" style="display: none;">Ver Evidencia</button>
          <button class="back-btn primary-btn" id="btn-export" style="display: none;">Exportar Diagnóstico</button>
        </div>
      </div>

      <!-- Modal de Evidencia -->
      <div id="evidence-modal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
        <div class="modal-content" style="background: var(--bg-panel); padding: 30px; border-radius: 8px; width: 80%; max-width: 600px; border: 1px solid var(--border);">
          <h2 style="margin-top: 0; color: var(--accent);">Evidencia Extraída (XAI)</h2>
          <div id="evidence-content" style="margin-bottom: 20px;"></div>
          <button class="back-btn" onclick="document.getElementById('evidence-modal').style.display='none'">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
